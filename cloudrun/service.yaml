apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tech-challenge-ia-saude
  annotations:
    run.googleapis.com/description: "API acadêmica de apoio à triagem de hipotireoidismo"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/scaling-concurrency-target: "15"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/REPOSITORY/tech-challenge:latest
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PATH
              value: models/random_forest_otimizado.joblib
            - name: LOG_LEVEL
              value: INFO
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
